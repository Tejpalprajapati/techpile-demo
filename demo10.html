<html>
<head>
<script>
function demo()
{
var x=document.getElementById("h")
x.style.height="200px"
x.style.width="200px"
x.style.border="10px groove maroon"
x.style.background="aqua"
x.style.borderRadius="20px"
x.style.transform="rotate(60deg)"
x.style.textAlign="center"
x.style.transition="all ease 2s"
x.style.lineHeight="200px"
x.style.color="red"
}
</script>
</head>
<body>
<div id="h">TECHPILE TECHNOOGY</div>
<button onmouseover="demo()">SET STYLE</button>
</body>
</html>
